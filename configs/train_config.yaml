# =============================================================================
# Construction Site Safety Violation Classifier — Training Configuration
# =============================================================================

# --- Data ---
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  labels_csv: "data/labels/labels.csv"
  split_ratios:
    train: 0.80
    val: 0.10
    test: 0.10
  random_seed: 42

# --- Model ---
model:
  architecture: "convnext_tiny"       # convnext_tiny | convnext_small | efficientnet_v2_s | resnet50
  pretrained: true
  num_classes: 23                     # must match taxonomy.py (5 categories, 23 violations)
  dropout: 0.2                        # dropout before final FC layer

# --- Training ---
training:
  # Phase 1: frozen backbone, train head only
  phase1:
    epochs: 5
    learning_rate: 1.0e-3
    freeze_backbone: true

  # Phase 2: unfreeze last blocks, lower LR
  phase2:
    epochs: 15
    learning_rate: 1.0e-4
    freeze_backbone: false
    unfreeze_from: "features.7"       # ConvNeXt last stage (adjust per arch)

  # Phase 3: full fine-tune (optional)
  phase3:
    epochs: 10
    learning_rate: 1.0e-5
    freeze_backbone: false

  batch_size: 32
  num_workers: 4
  optimizer: "adamw"
  weight_decay: 1.0e-2
  scheduler: "cosine"                 # cosine | step | plateau
  warmup_epochs: 2
  early_stopping_patience: 5

# --- Augmentation ---
augmentation:
  image_size: 224
  train:
    horizontal_flip: 0.5
    vertical_flip: 0.0
    random_rotation: 15               # degrees
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.2
      hue: 0.1
    random_resized_crop:
      scale: [0.7, 1.0]
      ratio: [0.75, 1.33]
    gaussian_blur: 0.1
    normalize:
      mean: [0.485, 0.456, 0.406]    # ImageNet
      std: [0.229, 0.224, 0.225]
  val:
    resize: 256
    center_crop: 224
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# --- Loss ---
loss:
  type: "bce_with_logits"             # multi-label classification
  use_class_weights: true             # auto-compute from label frequency
  label_smoothing: 0.05

# --- Evaluation ---
evaluation:
  threshold: 0.5                      # sigmoid threshold for positive prediction
  metrics:
    - "f1_per_class"
    - "f1_macro"
    - "precision_macro"
    - "recall_macro"
    - "hamming_loss"

# --- Output ---
output:
  checkpoint_dir: "checkpoints"
  log_dir: "runs"                     # TensorBoard logs
  save_best_metric: "f1_macro"
  save_every_n_epochs: 5
