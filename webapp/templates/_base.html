<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Violation AI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-semibold text-slate-900">
        <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
        Violation AI
      </a>
      <div class="text-xs text-slate-500 hidden sm:block">
        model: <code>{{ model or "?" }}</code>
      </div>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6">
    {% block body %}{% endblock %}
  </main>
  <footer id="app-footer"
          class="fixed bottom-0 inset-x-0 bg-white/95 backdrop-blur border-t border-slate-200 z-40">
    <div class="max-w-6xl mx-auto px-6 py-2.5 flex items-center justify-between text-xs text-slate-600">
      <div>
        Training set:
        <span id="stat-training" class="font-semibold text-slate-900 tabular-nums">—</span>
        examples
      </div>
      <div class="hidden sm:block">
        Session:
        <span id="stat-session-uploaded" class="font-semibold tabular-nums">0</span> uploaded ·
        <span id="stat-session-confirmed" class="font-semibold tabular-nums">0</span> confirmed ·
        <span id="stat-session-corrected" class="font-semibold tabular-nums">0</span> corrected
      </div>
      <div class="text-slate-400">
        every confirmation trains the AI
      </div>
    </div>
  </footer>
</body>
</html>
