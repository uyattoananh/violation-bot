# Fly.io app config — Phase-1 webapp
# Create + deploy with:
#   fly launch --no-deploy --name violation-ai-webapp --dockerfile Dockerfile.webapp
#   fly secrets set ANTHROPIC_API_KEY=... SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=... \
#                   R2_ACCOUNT_ID=... R2_ACCESS_KEY_ID=... R2_SECRET_ACCESS_KEY=... \
#                   R2_BUCKET=aecis-violations APP_ADMIN_PASSWORD=...
#   fly deploy

app = "violation-ai-webapp"
primary_region = "sin"          # Singapore (closest Fly region to Vietnam)

[build]
  dockerfile = "Dockerfile.webapp"

[env]
  PORT = "8000"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

  [[services.http_checks]]
    interval = "30s"
    grace_period = "10s"
    method = "get"
    path = "/healthz"
    protocol = "http"
    timeout = "5s"

# Separate worker process for queued classification.
# Run it via:  fly machine run . --name worker --process worker
[processes]
  app = "uvicorn webapp.app:app --host 0.0.0.0 --port 8000"
  worker = "python -m webapp.worker"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
